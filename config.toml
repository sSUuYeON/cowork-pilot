[engine]
default = "claude"

[engine.codex]
command = "codex"
args = ["-q"]

[engine.claude]
command = "claude"
args = ["-p"]

[watcher]
debounce_seconds = 2.0
poll_interval_seconds = 0.5

[responder]
post_verify_timeout_seconds = 30.0
max_retries = 3
activate_delay_seconds = 0.3

[session]
base_path = "~/Library/Application Support/Claude/local-agent-mode-sessions"

[logging]
path = "logs/cowork-pilot.jsonl"
level = "INFO"

# [project]
# dir = 

[harness]
idle_timeout_seconds = 120
completion_check_max_retries = 3
incomplete_retry_max = 3
exec_plans_dir = "docs/exec-plans"

[harness.session]
open_delay_seconds = 3.0
prompt_delay_seconds = 1.0
detect_timeout_seconds = 10.0
detect_poll_interval = 1.0
